
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu des Balises</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; position: relative; }
        
        .score-box { position: absolute; top: 15px; right: 20px; background: #7b1fa2; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        
        h1 { color: #4a148c; font-size: 1.5rem; margin-top: 10px; }
        .step { display: none; }
        .step.active { display: block; }
        select { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; }
        .btn-main { background: #7b1fa2; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .card { border: 2px solid #eee; border-radius: 12px; padding: 5px; cursor: pointer; background: #fff; transition: 0.2s; }
        .card:hover { border-color: #7b1fa2; background: #f3e5f5; }
        .card img { width: 100%; height: auto; border-radius: 8px; display: block; }

        .result { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; }
        .success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .error { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        .color-badge { display: block; font-size: 1.4rem; font-weight: bold; margin: 10px 0; color: #4a148c; }
        .screenshot-reminder { font-size: 0.85rem; color: #555; font-style: italic; border-top: 1px solid #c8e6c9; padding-top: 8px; margin-top: 8px; }
        
        .btn-reset { margin-top: 20px; background: none; border: none; color: #888; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="score-box">Score : <span id="scoreValue">0</span></div>

    <h1>🧭 Jeu de Piste</h1>

    <div id="step1" class="step active">
        <p>Indiquez le numéro de votre <strong>dernière balise</strong> :</p>
        <select id="baliseSelect">
            <option value="" disabled selected>Choisir la balise...</option>
            <script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">Balise ${i}</option>`);</script>
        </select>
        <button class="btn-main" onclick="start()">VALIDER</button>
    </div>

    <div id="step2" class="step">
        <p>À la balise <strong id="numB"></strong>,<br>quel était le <strong>symbole VIOLET</strong> ?</p>
        <div class="grid" id="symbolGrid"></div>
        <div id="feedback" class="result"></div>
        <button class="btn-reset" onclick="location.reload()">Retour</button>
    </div>
</div>

<script>
    let score = 0; 
    let bCurrent = null;
    let aRepondu = false;

    // Tes images
    const signes = [
        { img: "feuille 8.png" }, { img: "vent 4.png" }, { img: "feu 10.png" },
        { img: "goutte 2.png" }, { img: "feuille 12.png" }, { img: "vent 11.png" },
        { img: "feu 1.png" }, { img: "goutte 9.png" }, { img: "vent 6.png" },
        { img: "feuille 7.png" }, { img: "goutte 5.png" }, { img: "feu 3.png" }
    ];

    // Les bonnes réponses (Fichiers -> Couleurs indices)
    const solutions = {
        1:  { img: "feu 1.png",     x: "JAUNE" },
        2:  { img: "goutte 2.png",  x: "JAUNE" },
        3:  { img: "feu 3.png",     x: "JAUNE" },
        4:  { img: "vent 4.png",    x: "JAUNE" },
        5:  { img: "goutte 5.png",  x: "JAUNE" },
        6:  { img: "vent 6.png",    x: "JAUNE" },
        7:  { img: "feuille 7.png", x: "JAUNE" },
        8:  { img: "feuille 8.png", x: "JAUNE" },
        9:  { img: "goutte 9.png",  x: "JAUNE" },
        10: { img: "feu 10.png",    x: "JAUNE" },
        11: { img: "vent 11.png",   x: "JAUNE" },
        12: { img: "feuille 12.png",x: "JAUNE" }
    };

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function start() {
        bCurrent = document.getElementById('baliseSelect').value;
        if(!bCurrent) return;
        aRepondu = false;
        document.getElementById('numB').innerText = bCurrent;
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('symbolGrid');
        grid.innerHTML = ""; 
        const melange = shuffle([...signes]);
        melange.forEach(s => {
            const d = document.createElement('div');
            d.className = 'card';
            d.onclick = () => verify(s.img);
            d.innerHTML = `<img src="${s.img}">`;
            grid.appendChild(d);
        });
    }

    function verify(imgCliquee) {
        const f = document.getElementById('feedback');
        const sol = solutions[bCurrent];
        f.style.display = "block";

        if(imgCliquee === sol.img) {
            if(!aRepondu) { 
                score++; 
                document.getElementById('scoreValue').innerText = score;
                aRepondu = true; 
            }
            f.className = "result success";
            f.innerHTML = `
                ✅ Bravo ! L'indice est : 
                <span class="color-badge">${sol.x}</span>
                <div class="screenshot-reminder">📸 N'oubliez pas de prendre un screenshot de votre score !</div>
            `;
        } else {
            if(!aRepondu) { 
                score--; 
                document.getElementById('scoreValue').innerText = score;
            }
            f.className = "result error";
            f.innerHTML = "❌ Ce n'est pas le bon symbole. Score -1";
        }
    }
</script>

</body>
</html>
